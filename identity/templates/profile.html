{% extends 'base.html' %}

{% block title %}Profile - UserHub{% endblock %}

{% block content %}
<div class="profile-container">
    <!-- Profile Header -->
    <div class="profile-header">
        <div class="profile-avatar">
            {{ username|first|upper }}
        </div>
        <div class="profile-info">
            <h2>{{ username }}</h2>
            <p>Account Owner</p>
        </div>
    </div>

    <!-- Profile Details -->
    <div class="profile-items">
        <div class="profile-item">
            <span class="profile-label">📧 Email Address</span>
            <span class="profile-value">{{ email }}</span>
        </div>
        <div class="profile-item">
            <span class="profile-label">👤 Username</span>
            <span class="profile-value">{{ username }}</span>
        </div>
        <div class="profile-item">
            <span class="profile-label">📅 Member Since</span>
            <span class="profile-value">Today</span>
        </div>
    </div>

    <!-- Actions -->
    <div class="profile-actions">
        <a href="{% url 'login' %}" class="btn btn-outline-primary">Edit Profile</a>
        <a href="{% url 'logout' %}" class="btn btn-outline-danger">Logout</a>
    </div>
</div>

<style>
    .profile-container {
        background: white;
        border-radius: 0.75rem;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-width: 600px;
        margin: 2rem auto;
    }

    .profile-header {
        display: flex;
        align-items: center;
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 2px solid #e5e7eb;
    }

    .profile-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #2563eb, #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 2rem;
        font-weight: 700;
        margin-right: 1.5rem;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .profile-info h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
        color: #1f2937;
    }

    .profile-info p {
        color: #6b7280;
        margin: 0;
        font-size: 0.95rem;
    }

    .profile-items {
        margin: 0;
    }

    .profile-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.25rem 0;
        border-bottom: 1px solid #e5e7eb;
    }

    .profile-item:last-child {
        border-bottom: none;
    }

    .profile-label {
        font-weight: 600;
        color: #1f2937;
        font-size: 0.95rem;
    }

    .profile-value {
        color: #6b7280;
        font-size: 0.95rem;
        word-break: break-all;
    }

    .profile-actions {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e5e7eb;
    }

    .btn {
        flex: 1;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        text-decoration: none;
        text-align: center;
        transition: all 0.3s ease;
        border: 1.5px solid;
        cursor: pointer;
    }

    .btn-outline-primary {
        color: #2563eb;
        border-color: #2563eb;
        background: transparent;
    }

    .btn-outline-primary:hover {
        background-color: #2563eb;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .btn-outline-danger {
        color: #ef4444;
        border-color: #ef4444;
        background: transparent;
    }

    .btn-outline-danger:hover {
        background-color: #ef4444;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
</style>
{% endblock %}
