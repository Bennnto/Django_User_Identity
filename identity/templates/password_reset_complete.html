{% extends 'base.html' %}

{% block title %}Password Reset Complete - UserHub{% endblock %}

{% block content %}
<div class="form-container">
    <div class="text-center">
        <div class="success-icon">✅</div>
        <h1 class="form-title">Password Reset Successful</h1>
        <p class="form-subtitle">Your password has been successfully updated</p>
        
        <div class="success-message">
            <p>You can now sign in to your account with your new password.</p>
        </div>

        <a href="{% url 'login' %}" class="btn btn-primary w-100 py-3 fw-600">Go to Login</a>
    </div>
</div>

<style>
    .form-container {
        background: white;
        border-radius: 0.75rem;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-width: 450px;
        margin: 2rem auto;
    }

    .text-center {
        text-align: center;
    }

    .success-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        display: block;
    }

    .form-title {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #1f2937;
    }

    .form-subtitle {
        color: #6b7280;
        margin-bottom: 1.5rem;
        font-size: 0.95rem;
    }

    .success-message {
        background-color: #d1fae5;
        border-left: 4px solid #10b981;
        padding: 1rem;
        border-radius: 0.5rem;
        margin: 2rem 0;
        text-align: left;
    }

    .success-message p {
        color: #065f46;
        margin: 0;
        font-weight: 500;
    }

    .fw-600 {
        font-weight: 600;
    }

    .btn {
        border-radius: 0.5rem;
        font-weight: 600;
        transition: all 0.3s ease;
        border: none;
        text-decoration: none;
        display: inline-block;
    }

    .btn-primary {
        background-color: #2563eb;
        color: white;
    }

    .btn-primary:hover {
        background-color: #1d4ed8;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .w-100 {
        width: 100%;
    }
</style>
{% endblock %}
